name: Build Release Images

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream release tag to package
        required: true
        default: v0.2.0
      push_latest:
        description: Also publish the latest tag
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/ghost233/multica-server-image/backend
  FRONTEND_IMAGE: ghcr.io/ghost233/multica-server-image/frontend

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      safe_tag: ${{ steps.meta.outputs.safe_tag }}
      commit: ${{ steps.meta.outputs.commit }}
      backend_tags: ${{ steps.meta.outputs.backend_tags }}
      frontend_tags: ${{ steps.meta.outputs.frontend_tags }}
    steps:
      - name: Validate and derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw_ref='${{ inputs.upstream_ref }}'
          raw_ref="${raw_ref#refs/tags/}"
          if ! printf '%s' "$raw_ref" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Expected a release tag like v0.2.0, got: $raw_ref" >&2
            exit 1
          fi
          safe_tag="$(printf '%s' "$raw_ref" | tr '/:@' '-')"
          commit="$(git ls-remote https://github.com/multica-ai/multica.git "refs/tags/${raw_ref}" | awk '{print $1}')"
          if [ -z "$commit" ]; then
            echo "Could not resolve upstream tag ${raw_ref}" >&2
            exit 1
          fi
          backend_tags="${BACKEND_IMAGE}:${safe_tag}"
          frontend_tags="${FRONTEND_IMAGE}:${safe_tag}"
          if [ '${{ inputs.push_latest }}' = 'true' ]; then
            backend_tags="${backend_tags}\n${BACKEND_IMAGE}:latest"
            frontend_tags="${frontend_tags}\n${FRONTEND_IMAGE}:latest"
          fi
          {
            echo "version=${raw_ref}"
            echo "safe_tag=${safe_tag}"
            echo "commit=${commit}"
            echo 'backend_tags<<EOF'
            printf '%b\n' "$backend_tags"
            echo 'EOF'
            echo 'frontend_tags<<EOF'
            printf '%b\n' "$frontend_tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  backend:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: multica-ai/multica
          ref: ${{ needs.prepare.outputs.version }}
          path: upstream
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ needs.prepare.outputs.backend_tags }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.description=Multica backend release image
            org.opencontainers.image.vendor=Ghost233

  frontend:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: multica-ai/multica
          ref: ${{ needs.prepare.outputs.version }}
          path: upstream
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ needs.prepare.outputs.frontend_tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.description=Multica frontend release image
            org.opencontainers.image.vendor=Ghost233
