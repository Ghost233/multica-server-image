services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    image: ghcr.io/ghost233/multica-server-image/backend:${MULTICA_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      RUN_MIGRATIONS_ON_START: "1"

  frontend:
    image: ghcr.io/ghost233/multica-server-image/frontend:${MULTICA_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REMOTE_API_URL: ${REMOTE_API_URL:-http://backend:8080}

